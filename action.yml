name: 'vibestats'
description: 'Aggregate Claude Code session activity and update your GitHub profile heatmap'

branding:
  icon: 'activity'
  color: 'orange'

inputs:
  token:
    description: 'Fine-grained PAT with Contents write access to profile-repo (VIBESTATS_TOKEN)'
    required: true
  profile-repo:
    description: 'GitHub profile repo in format username/username'
    required: true
  github-token:
    description: 'Classic PAT (or gh OAuth token) able to read your contributions via GraphQL viewer.contributionsCollection — captures private contribution counts. Optional; the GitHub contributions heatmap is skipped if absent.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout vibestats-data
      uses: actions/checkout@v4

    - name: Checkout profile-repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.profile-repo }}
        token: ${{ inputs.token }}
        path: _profile_repo

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Fetch GitHub contributions (incl. private)
      shell: bash
      env:
        VIBESTATS_GH_TOKEN: ${{ inputs.github-token }}
      run: |
        python ${{ github.action_path }}/action/fetch_github_contributions.py

    - name: Run aggregate.py
      shell: bash
      run: |
        mkdir -p _profile_repo/vibestats
        python ${{ github.action_path }}/action/aggregate.py
        mv data.json _profile_repo/vibestats/data.json

    - name: Run generate_svg.py (light + dark)
      shell: bash
      run: |
        python ${{ github.action_path }}/action/generate_svg.py \
          --input _profile_repo/vibestats/data.json \
          --output _profile_repo/vibestats/heatmap.svg \
          --theme light
        python ${{ github.action_path }}/action/generate_svg.py \
          --input _profile_repo/vibestats/data.json \
          --output _profile_repo/vibestats/heatmap-dark.svg \
          --theme dark

    - name: Run generate_svg.py github contributions (light + dark)
      shell: bash
      run: |
        python ${{ github.action_path }}/action/generate_svg.py \
          --input _profile_repo/vibestats/data.json \
          --output _profile_repo/vibestats/github-contributions.svg \
          --metric github_contributions \
          --theme light
        python ${{ github.action_path }}/action/generate_svg.py \
          --input _profile_repo/vibestats/data.json \
          --output _profile_repo/vibestats/github-contributions-dark.svg \
          --metric github_contributions \
          --theme dark

    - name: Run update_readme.py
      shell: bash
      env:
        PROFILE_REPO: ${{ inputs.profile-repo }}
      run: |
        USERNAME="${PROFILE_REPO%%/*}"
        python ${{ github.action_path }}/action/update_readme.py \
          --username "$USERNAME" \
          --readme-path _profile_repo/README.md

    - name: Commit outputs to profile-repo
      shell: bash
      run: |
        cd _profile_repo
        git config user.name "vibestats[bot]"
        git config user.email "vibestats[bot]@users.noreply.github.com"
        git add vibestats/data.json vibestats/heatmap.svg vibestats/heatmap-dark.svg \
          vibestats/github-contributions.svg vibestats/github-contributions-dark.svg README.md
        git diff --cached --quiet && echo "vibestats: no changes to commit" && exit 0
        git commit -m "chore(vibestats): update heatmap [skip ci]"

    - name: Push to profile-repo
      shell: bash
      run: |
        cd _profile_repo
        for i in 1 2 3; do
          git push && exit 0
          sleep $((i * 2))
        done
        exit 1

    - name: Commit contributions snapshot to vibestats-data
      shell: bash
      run: |
        # Persist the max-merged snapshot back to vibestats-data so history
        # accumulates across daily runs. Runs last and is non-fatal: a push
        # failure (e.g. missing contents:write permission) must never break the
        # daily aggregate — the snapshot simply retries on the next run.
        if [ ! -f github/contributions.json ]; then
          echo "vibestats: no contributions snapshot to commit"
          exit 0
        fi
        git config user.name "vibestats[bot]"
        git config user.email "vibestats[bot]@users.noreply.github.com"
        git add github/contributions.json
        git diff --cached --quiet && echo "vibestats: contributions unchanged" && exit 0
        git commit -m "chore(vibestats): update GitHub contributions snapshot [skip ci]"
        for i in 1 2 3; do
          git push && exit 0
          git pull --rebase --autostash || true
          sleep $((i * 2))
        done
        echo "vibestats: WARNING — could not push contributions snapshot (retries next run)" >&2
        exit 0
