name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag matches Cargo package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          expected_tag="v${package_version}"
          if [[ "${REF_NAME}" != "${expected_tag}" ]]; then
            echo "Release tag ${REF_NAME} does not match Cargo package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux target only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (macOS native)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross for Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Archive binary
        run: |
          tar czf vibestats-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release vibestats

      - name: Generate checksum
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 vibestats-${{ matrix.target }}.tar.gz > vibestats-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum vibestats-${{ matrix.target }}.tar.gz > vibestats-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vibestats-${{ matrix.target }}
          path: |
            vibestats-${{ matrix.target }}.tar.gz
            vibestats-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            vibestats-aarch64-apple-darwin/vibestats-aarch64-apple-darwin.tar.gz
            vibestats-aarch64-apple-darwin/vibestats-aarch64-apple-darwin.tar.gz.sha256
            vibestats-x86_64-apple-darwin/vibestats-x86_64-apple-darwin.tar.gz
            vibestats-x86_64-apple-darwin/vibestats-x86_64-apple-darwin.tar.gz.sha256
            vibestats-x86_64-unknown-linux-gnu/vibestats-x86_64-unknown-linux-gnu.tar.gz
            vibestats-x86_64-unknown-linux-gnu/vibestats-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update floating major-version tag
        # Keeps stephenleo/vibestats@v2 pointing at the latest v2.x release,
        # matching the pattern used by first-party Actions (e.g. actions/checkout@v4).
        # REF_NAME passed via env: to avoid expression injection in run: blocks.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          major="${REF_NAME%%.*}"   # v1.2.0 → v1
          git tag "$major" "$REF_NAME" --force
          git push origin "$major" --force

  publish-crate:
    name: Publish to crates.io
    # Wait for the GitHub Release to succeed first — crates.io publishes are
    # irreversible (only yankable), so we don't want a live crate version
    # without a matching GitHub Release if `release` fails.
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        # Tag/version parity is already enforced by the build job's
        # "Validate release tag matches Cargo package version" step,
        # so by this point Cargo.toml's version == github.ref_name.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
